<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live Streaming App</title>

<script src="https://unpkg.com/zego-express-engine-webrtc"></script>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
margin:0;
}

.header{
display:flex;
justify-content:space-between;
padding:10px;
background:#1a1a1a;
}

.live-badge{
background:red;
padding:5px 10px;
border-radius:6px;
}

#video-container{
width:100%;
height:50vh;
background:black;
display:flex;
justify-content:center;
align-items:center;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

.chat-container{
height:30vh;
overflow-y:auto;
padding:10px;
background:#111;
}

.message{
margin:5px 0;
}

.chat-input{
display:flex;
padding:10px;
background:#1a1a1a;
}

.chat-input input{
flex:1;
padding:10px;
border:none;
border-radius:6px;
}

.chat-input button{
margin-left:10px;
padding:10px;
background:#ff4081;
color:white;
border:none;
border-radius:6px;
}

.gifts{
display:flex;
justify-content:space-around;
padding:10px;
background:#111;
}

.gift{
cursor:pointer;
font-size:24px;
}

</style>

</head>

<body>

<div class="header">

<div class="live-badge">🔴 LIVE</div>

<div id="viewer-count">👥 0 viewers</div>

</div>

<div id="video-container">
<video id="local-video" autoplay muted></video>
</div>

<div class="chat-container" id="chat"></div>

<div class="chat-input">

<input id="message-input" placeholder="Type a message">

<button onclick="sendMessage()">Send</button>

</div>

<div class="gifts">

<div class="gift" onclick="sendGift('🌹')">🌹</div>

<div class="gift" onclick="sendGift('💎')">💎</div>

<div class="gift" onclick="sendGift('🚗')">🚗</div>

<div class="gift" onclick="sendGift('👑')">👑</div>

</div>

<script>

const appID = 1764562006
const server = "wss://webliveroom.zego.im/ws"

const zg = new ZegoExpressEngine(appID, server)

let streamID = "live_stream_001"
let viewers = 0

async function startLive(){

const localStream = await zg.createStream({
camera:{audio:true,video:true}
})

document.getElementById("local-video").srcObject = localStream

await zg.startPublishingStream(streamID, localStream)

viewers++
updateViewers()

}

async function joinLive(){

const remoteStream = await zg.startPlayingStream(streamID)

document.getElementById("local-video").srcObject = remoteStream

viewers++
updateViewers()

}

function updateViewers(){

document.getElementById("viewer-count").innerText = "👥 " + viewers + " viewers"

}

function sendMessage(){

const input = document.getElementById("message-input")

const message = input.value

if(message==="") return

const chat = document.getElementById("chat")

const div = document.createElement("div")

div.className="message"

div.innerText="User: "+message

chat.appendChild(div)

input.value=""

chat.scrollTop=chat.scrollHeight

}

function sendGift(gift){

const chat = document.getElementById("chat")

const div = document.createElement("div")

div.className="message"

div.innerText="🎁 User sent "+gift

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

}

</script>

</body>
</html>
